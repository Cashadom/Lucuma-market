    /* ═══════════════════════════════════════
       DESIGN SYSTEM — LUCUMA MARKET

    :root {
      --or:       #C8922A;
      --or-light: #E8C87A;
      --or-pale:  #F9F0DC;
      --or-dark:  #8B5E1A;
      --vert:     #3A5A40;
      --vert-l:   #A8C5AD;
      --terre:    #6B4E3D;
      --creme:    #FDF8EF;
      --blanc:    #FFFFFF;
      --sombre:   #1A1208;
      --gris:     #6B6355;
      --gris-l:   #EAE5DC;
      --shadow:   0 4px 24px rgba(26,18,8,.10);
      --shadow-lg:0 12px 48px rgba(26,18,8,.16);
      --radius:   2px;
      --trans:    .32s cubic-bezier(.4,0,.2,1);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--creme);

      letter-spacing: .22em;
      text-transform: uppercase;

      margin-bottom: 12px;

    img { display: block; max-width: 100%; }

    /* ─── HEADER / NAV ─── */

      text-decoration: none;
    }
    .logo-img-wrap {
      width: 48px; height: 48px;
      border-radius: 50%;

      background: var(--or-pale);
      border: 2px solid var(--or-light);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; color: var(--or); text-align: center; font-weight: 600;
    }
    .logo-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .logo-img-placeholder { font-size: .55rem; color: var(--or); text-align: center; line-height: 1.2; padding: 4px; }

    .logo-text {

      color: var(--sombre);

    .logo-sub {

      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;

    .nav-links {

      font-size: .875rem;
      font-weight: 500;
      color: var(--gris);
      letter-spacing: .02em;
      transition: color var(--trans);

    }
